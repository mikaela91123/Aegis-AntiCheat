name: Aegis
version: '${version}'
main: org.legacy.aegis.Aegis
api-version: '1.21'
folia-supported: true
description: 'Aegis Anti-Cheat - Advanced Hybrid Detection System'
author: Legacy

softdepend:
  - floodgate
  - ProtocolLib
  - ViaVersion

commands:
  ac:
    description: Aegis Anti-Cheat main command
    usage: /<command> <subcommand>
    permission: aegis.command
    aliases: [aegis, anticheat]
  appeal:
    description: Submit a ban appeal
    usage: /appeal <evidenceID> <reason>
    permission: aegis.appeal

permissions:
  aegis.command:
    description: Access to Aegis commands
    default: op
  aegis.alerts:
    description: Receive cheat detection alerts
    default: op
  aegis.admin:
    description: Full admin access to Aegis
    default: op
  aegis.bypass:
    description: Bypass all checks
    default: false
  aegis.appeal:
    description: Submit ban appeals
    default: true
